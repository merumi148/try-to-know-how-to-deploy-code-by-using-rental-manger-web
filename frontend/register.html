<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="./css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5 app-layout">
        <div class="row justify-content-center align-items-center" style="min-height:85vh;">
            <div class="col-md-7 col-lg-6">
                <div class="topbar mb-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2"><div class="brand-mark">PT</div><strong>Quản lý Phòng Trọ</strong></div>
                    <a href="./index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i></a>
                </div>
                <div class="content-card p-4">
                    <h1 class="h4 mb-3">Tạo tài khoản</h1>
                    <div id="alertBox" class="alert d-none"></div>
                    <form onsubmit="handleRegister(event)">
                        <div class="mb-3"><label class="form-label">Họ và tên</label><input id="full_name" class="form-control" placeholder="Nhập họ tên" required></div>
                        <div class="mb-3"><label class="form-label">Số điện thoại</label><input id="phone" class="form-control" placeholder="Nhập số điện thoại" required></div>
                        <div class="mb-3"><label class="form-label">Email</label><input id="email" class="form-control" type="email" placeholder="Nhập email" required></div>
                        <div class="mb-3"><label class="form-label">Mật khẩu</label><input id="password" class="form-control" type="password" placeholder="Tạo mật khẩu" required></div>
                        <div class="mb-3">
                            <label class="form-label">Vai trò</label>
                            <select id="role" class="form-select" required>
                                <option value="tenant">Người thuê</option>
                                <option value="landlord">Chủ trọ</option>
                            </select>
                        </div>
                        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-person-plus"></i> Đăng ký</button>
                    </form>
                    <p class="mt-3 mb-0 small">Đã có tài khoản? <a href="./login.html">Đăng nhập</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <footer class="bg-dark text-light mt-4">
      <div class="container py-4">
        
        <div class="row g-3 py-3">
          <div class="col-md-3">
            <h6 class="mb-2">Boarding House Management System</h6>
            <div>Quản lý phòng trọ nhanh chóng và hiệu quả</div>
          </div>
          <div class="col-md-3">
            <h6 class="mb-2">Quick Links</h6>
            <div>
              <a class="text-light text-decoration-none" href="./index.html">Trang chủ</a> |
              <a class="text-light text-decoration-none" href="./rooms.html">Phòng</a> |
              <a class="text-light text-decoration-none" href="./tenant/dashboard.html">Người thuê</a> |
              <a class="text-light text-decoration-none" href="./tenant/payments.html">Hóa đơn</a>
            </div>
          </div>
          <div class="col-md-3">
            <h6 class="mb-2">Contact</h6>
            <div>Email: merumi148@gmail.com</div>
          </div>
          <div class="col-md-3">
            <h6 class="mb-2">© 2026 | Developed by mry</h6>
          </div>
        </div>
        
      </div>
    </footer>
</body>
</html>
