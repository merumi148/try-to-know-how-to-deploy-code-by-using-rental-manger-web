<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Danh sách phòng trọ</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"><link href="./css/style.css" rel="stylesheet"></head><body>
<div class="container-fluid p-3 app-layout"><div class="topbar d-flex justify-content-between align-items-center mb-3"><div class="d-flex align-items-center gap-2"><div class="brand-mark">PT</div><strong>Danh sách Phòng Trọ</strong></div><a href="./index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Quay lại</a></div><div class="row g-3" id="roomsContainer"></div></div>
<script src="./js/api.js"></script><script>
function toImageUrl(path){if(!path)return"https://via.placeholder.com/800x500?text=No+Image";if(path.startsWith('http'))return path;return `${window.location.origin}${APP_BASE}/${path.replace(/^\/+/,"")}`}
async function loadRooms(){const container=document.getElementById('roomsContainer');try{const data=await apiRequest('/rooms/get_rooms.php');const rooms=data.rooms||[];container.innerHTML=rooms.map(r=>`<div class="col-md-6 col-xl-4"><div class="section-card overflow-hidden h-100"><img src="${toImageUrl((r.images&&r.images[0])?r.images[0]:"")}" class="room-thumb"><div class="p-3"><div class="d-flex justify-content-between"><strong>Phòng ${r.room_number||'-'}</strong><span class="badge ${r.status==='available'?'bg-success':'bg-secondary'}">${r.status||'-'}</span></div><div class="mt-1 small text-muted">Diện tích: ${r.area||0} m2</div><div class="fw-semibold">${Number(r.price||0).toLocaleString()} VND</div><p class="small mb-0 mt-2">${r.description||''}</p><div class="mt-2 d-flex gap-2"><button class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i> Xem chi tiết</button><button class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil-square"></i> Chỉnh sửa</button><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Xóa</button></div></div></div></div>`).join('')||'<div class="text-muted">Không có dữ liệu.</div>';}catch(e){container.innerHTML=`<div class="alert alert-danger">${e.message}</div>`;}}
loadRooms();
</script>
<footer class="bg-dark text-light mt-4">
  <div class="container py-4">
    
    <div class="row g-3 py-3">
      <div class="col-md-3">
        <h6 class="mb-2">Boarding House Management System</h6>
        <div>Quản lý phòng trọ nhanh chóng và hiệu quả</div>
      </div>
      <div class="col-md-3">
        <h6 class="mb-2">Quick Links</h6>
        <div>
          <a class="text-light text-decoration-none" href="./index.html">Trang chủ</a> |
          <a class="text-light text-decoration-none" href="./rooms.html">Phòng</a> |
          <a class="text-light text-decoration-none" href="./tenant/dashboard.html">Người thuê</a> |
          <a class="text-light text-decoration-none" href="./tenant/payments.html">Hóa đơn</a>
        </div>
      </div>
      <div class="col-md-3">
        <h6 class="mb-2">Contact</h6>
        <div>Email: merumi148@gmail.com</div>
      </div>
      <div class="col-md-3">
        <h6 class="mb-2">© 2026 | Developed by mry</h6>
      </div>
    </div>
    
  </div>
</footer>
</body>
</html>
